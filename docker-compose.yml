version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: libreria-backend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev
    environment:
      - NODE_ENV=development
      - JWT_SECRET=your-secret-key-change-in-production
      - JWT_EXPIRES_IN=24h